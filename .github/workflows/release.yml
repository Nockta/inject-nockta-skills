# Publishes to npm via OIDC "trusted publishing" — NO npm token/secret is used.
#
# ONE-TIME PREREQUISITE (npmjs.com, owner-only): configure this package's
# Trusted Publisher before the first tag push, or `npm publish` will 4xx:
#   npmjs.com -> package Settings -> "Trusted Publisher" / Publishing access
#   Provider:          GitHub Actions
#   Repository:        Nockta/inject-nockta-skills
#   Workflow filename: release.yml
#   Environment:       (leave blank)
#
# npm CLI note: OIDC trusted publishing needs npm >= 11.5.1. actions/setup-node
# with Node 20 ships npm 10.x, so we upgrade npm to latest before publishing.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # OIDC token for npm provenance + trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        # Pinned to the npm 11.x line, not `npm@latest`: npm 12.0.1 requires
        # Node >=22.9.0 and this job runs on Node 20 (compatible with 11.x's
        # `^20.17.0 || >=22.9.0` engine range). `npm@latest` would EBADENGINE here.
        run: npm install -g npm@11
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check if this version is already published
        id: guard
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$name@$version already on registry — skipping publish"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm with provenance
        if: steps.guard.outputs.already-published != 'true'
        run: npm publish --provenance --access public
